services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: vha_postgres
    environment:
      POSTGRES_USER: vha_superadmin
      POSTGRES_PASSWORD: local_docker_pw
      POSTGRES_MULTIPLE_DATABASES: vha_dev,vha_test
    ports:
      - 5432:5432
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_monitor
      -c pg_stat_monitor.pgsm_query_max_len=2048
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vha_superadmin -d vha_dev']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mylocalnetwork
    volumes:
      - ./db:/db
      - ./docker-postgresql-multiple-databases:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    container_name: vha_adminer
    ports:
      - '8888:8080'
    networks:
      - mylocalnetwork

networks:
  mylocalnetwork:
    driver: bridge
