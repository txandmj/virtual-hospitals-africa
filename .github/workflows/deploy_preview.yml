name: Deploy Preview Environment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push web image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker buildx build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA \
            --platform linux/arm64 \
            --cache-from type=gha,scope=pr-$PR_NUMBER \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER \
            --push .

      - name: Build, tag, and push migrator image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker buildx build \
            -f Dockerfile.migrator \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA-migrator \
            --platform linux/arm64 \
            --cache-from type=gha,scope=pr-$PR_NUMBER-migrator \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER-migrator \
            --push .

      - name: Build, tag, and push events image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker buildx build \
            -f Dockerfile.vha-events-processor \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA-events \
            --platform linux/arm64 \
            --cache-from type=gha,scope=pr-$PR_NUMBER-events \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER-events \
            --push .

      - name: Upload compose file to preview EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: scripts/deploy/docker-compose-preview-deploy.yml
          target: /opt/vha-preview/
          strip_components: 2

      - name: Deploy to preview EC2
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,SHA,PR_NUMBER

          # Migrations can take several minutes; allow up to 15 min total
          command_timeout: 15m
          script_path: scripts/deploy/preview_deploy.sh

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_EC2_IP: ${{ secrets.PREVIEW_EC2_IP }}
        with:
          script_path: scripts/deploy/comment_preview_url.js

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Teardown preview environment
        uses: appleboy/ssh-action@master
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: PR_NUMBER
          script_path: scripts/deploy/preview_teardown.sh

      - name: Comment teardown on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script_path: scripts/deploy/comment_teardown.js
