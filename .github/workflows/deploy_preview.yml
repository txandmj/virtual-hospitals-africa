name: Deploy Preview Environment

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push images to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA \
            --cache-from type=gha,scope=pr-$PR_NUMBER \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER \
            --push . > web.log 2>&1 &
          WEB_PID=$!

          docker build \
            -f Dockerfile.migrator \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA-migrator \
            --cache-from type=gha,scope=pr-$PR_NUMBER-migrator \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER-migrator \
            --push . > migrator.log 2>&1 &
          MIGRATOR_PID=$!

          docker build \
            -f Dockerfile.vha-events-processor \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA-events \
            --cache-from type=gha,scope=pr-$PR_NUMBER-events \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER-events \
            --push . > events.log 2>&1 &
          EVENTS_PID=$!

          set +e
          wait $WEB_PID;      WEB_STATUS=$?
          wait $MIGRATOR_PID; MIGRATOR_STATUS=$?
          wait $EVENTS_PID;   EVENTS_STATUS=$?
          set -e

          echo "::group::web build log"
          cat web.log
          echo "::endgroup::"
          echo "::group::migrator build log"
          cat migrator.log
          echo "::endgroup::"
          echo "::group::events build log"
          cat events.log
          echo "::endgroup::"

          if [ $WEB_STATUS -ne 0 ] || [ $MIGRATOR_STATUS -ne 0 ] || [ $EVENTS_STATUS -ne 0 ]; then
            echo "Build failed: web=$WEB_STATUS migrator=$MIGRATOR_STATUS events=$EVENTS_STATUS"
            exit 1
          fi

      - name: Upload compose file to preview EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.PREVIEW_EC2_SSH_KEY }}
          source: scripts/deploy/docker-compose-preview-deploy.yml
          target: /opt/vha-preview/
          strip_components: 2

      - name: Deploy to preview EC2
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.PREVIEW_EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,SHA,PR_NUMBER

          # Migrations can take several minutes; allow up to 15 min total
          command_timeout: 15m
          script_path: scripts/deploy/preview_deploy.sh

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_EC2_IP: ${{ secrets.PREVIEW_EC2_IP }}
        with:
          script: |
            const port = 8000 + parseInt(process.env.PR_NUMBER);
            const url = `http://${process.env.PREVIEW_EC2_IP}:${port}`;
            const body = `### Preview Environment\n\n**${url}**\n\n_Redeployed on each push. Torn down when this PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER),
            });

            const existing = comments.find(c => c.body.includes('Preview Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.PR_NUMBER),
                body,
              });
            }

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Teardown preview environment
        uses: appleboy/ssh-action@master
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.PREVIEW_EC2_SSH_KEY }}
          envs: PR_NUMBER
          script_path: scripts/deploy/preview_teardown.sh

      - name: Comment teardown on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER),
            });

            const existing = comments.find(c => c.body.includes('Preview Environment'));

            const body = `### Preview Environment\n\nTorn down.`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.PR_NUMBER),
                body,
              });
            }
