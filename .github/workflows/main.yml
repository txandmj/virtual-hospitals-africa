name: Main

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: read

jobs:
  cache:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          lfs: false

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.5

      - name: Deno install
        run: deno install --allow-scripts

      - name: Delete existing deno modules cache
        run: gh cache delete deno-modules || true
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/cache/save@v4
        name: Save deno modules
        with:
          path: ~/.cache/deno
          key: deno-modules

      - name: Git lfs pull
        run: git lfs pull

      - name: Delete existing git lfs cache
        run: gh cache delete git-lfs || true
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: actions/cache/save@v4
        name: Save git lfs cache
        with:
          path: .git/lfs/objects
          key: git-lfs

      - name: Verify caches saved
        run: |
          gh cache list --key deno-modules --json key --jq '.[0].key' | grep -q deno-modules
          gh cache list --key git-lfs --json key --jq '.[0].key' | grep -q git-lfs
        env:
          GH_TOKEN: ${{ github.token }}
