name: Test with Database

on:
  workflow_call:
    inputs:
      setup-lfs:
        type: boolean
        default: false
      build:
        type: string
        default: ':'
      run:
        type: string
        required: true
      artifact-name:
        type: string
        default: 'server-logs'
        description: 'Name for the uploaded log artifacts'
      run-step-name:
        type: string
        default: Test

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: vha_test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deno

      - uses: ./.github/actions/setup-lfs
        if: ${{ inputs.setup-lfs }}

      - uses: ./.github/actions/write-test-env

      - name: Init logs directory
        run: mkdir -p logs/slow_queries

      - name: Build
        run: ${{ inputs.build }}

      - name: ${{ inputs.run-step-name }}
        run: ${{ inputs.run }}

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: logs/
          retention-days: 3
          if-no-files-found: ignore
