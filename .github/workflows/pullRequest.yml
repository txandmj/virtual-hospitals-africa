name: Pull Request

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  BUILD_STRING: '${{ github.run_number }}-${{ github.sha }}'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deno

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Run check
        run: deno task check

  test_web:
    uses: ./.github/workflows/test-with-db.yml
    with:
      setup-lfs: true
      artifact-name: test-web-logs
      build: |
        deno task compile:s_expressions
        deno task db:restore snomed
        deno task db:migrate all
        deno task build
        test -f _fresh/client/.vite/manifest.json
      run: |
        deno task test --use-build test/web

  test_non_web:
    uses: ./.github/workflows/test-with-db.yml
    with:
      setup-lfs: true
      artifact-name: test-non-web-logs
      build: |
        deno task compile:s_expressions
        deno task db:restore snomed
        deno task db:migrate all
      run: |
        deno task test --ignore=test/web

  # TODO turn back on
  # test_chatbot:
  #   uses: ./.github/workflows/test-with-db.yml
  #   with:
  #     setup-lfs: true
  #     artifact-name: test-chatbot-logs
  #     run: |
  #       deno task db:restore snomed
  #       deno task db:migrate all
  #       deno task test:chatbot

  test_migrations:
    uses: ./.github/workflows/test-with-db.yml
    with:
      artifact-name: test-migrations-logs
      build: deno task db:migrate latest
      run: |
        deno task db:migrate to snomed_indexes
        deno task db:migrate latest

  build_container:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t vha .

  compile_web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deno

      - name: Build web
        run: deno task build

      - name: Compile web
        run: deno task compile:web

  compile_chatbot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup-deno

      - name: Compile chatbot
        run: deno task compile:chatbot

  deploy_preview:
    # needs:
    #   - check
    #   - test_web
    #   - test_non_web
    #   - test_migrations
    #   - build_container
    #   - compile_web
    #   - compile_chatbot
    concurrency:
      group: deploy-preview
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push images to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA \
            --cache-from type=gha,scope=pr-$PR_NUMBER \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER \
            --push . > web.log 2>&1 &
          WEB_PID=$!

          docker build \
            -f Dockerfile.migrator \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA-migrator \
            --cache-from type=gha,scope=pr-$PR_NUMBER-migrator \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER-migrator \
            --push . > migrator.log 2>&1 &
          MIGRATOR_PID=$!

          docker build \
            -f Dockerfile.vha-events-processor \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:pr-$PR_NUMBER-$SHA-events \
            --cache-from type=gha,scope=pr-$PR_NUMBER-events \
            --cache-to type=gha,mode=max,scope=pr-$PR_NUMBER-events \
            --push . > events.log 2>&1 &
          EVENTS_PID=$!

          set +e
          wait $WEB_PID;      WEB_STATUS=$?
          wait $MIGRATOR_PID; MIGRATOR_STATUS=$?
          wait $EVENTS_PID;   EVENTS_STATUS=$?
          set -e

          echo "::group::web build log"
          cat web.log
          echo "::endgroup::"
          echo "::group::migrator build log"
          cat migrator.log
          echo "::endgroup::"
          echo "::group::events build log"
          cat events.log
          echo "::endgroup::"

          if [ $WEB_STATUS -ne 0 ] || [ $MIGRATOR_STATUS -ne 0 ] || [ $EVENTS_STATUS -ne 0 ]; then
            echo "Build failed: web=$WEB_STATUS migrator=$MIGRATOR_STATUS events=$EVENTS_STATUS"
            exit 1
          fi

      - name: Delete superseded ECR images for this PR
        env:
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          OLD_TAGS=$(aws ecr list-images \
            --repository-name "$ECR_REPOSITORY" \
            --filter tagStatus=TAGGED \
            --query "imageIds[?starts_with(imageTag, 'pr-${PR_NUMBER}-') && !contains(imageTag, '${SHA}')].imageTag" \
            --output text)

          if [ -z "$OLD_TAGS" ]; then
            echo "No superseded images to clean up for PR $PR_NUMBER"
            exit 0
          fi

          IMAGE_IDS=""
          for tag in $OLD_TAGS; do
            IMAGE_IDS="$IMAGE_IDS imageTag=$tag"
          done

          echo "Deleting superseded images: $OLD_TAGS"
          aws ecr batch-delete-image \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids $IMAGE_IDS

      - name: Upload compose file to preview EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.PREVIEW_EC2_SSH_KEY }}
          source: scripts/deploy/docker-compose-preview-deploy.yml
          target: /opt/vha-preview/
          strip_components: 2

      - name: Deploy to preview EC2
        uses: appleboy/ssh-action@master
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          SHA: ${{ github.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          host: ${{ secrets.PREVIEW_EC2_HOST }}
          username: ${{ secrets.PREVIEW_EC2_USERNAME }}
          key: ${{ secrets.PREVIEW_EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,SHA,PR_NUMBER

          # Migrations can take several minutes; allow up to 15 min total
          command_timeout: 15m
          script_path: scripts/deploy/preview_deploy.sh

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_EC2_HOST: ${{ secrets.PREVIEW_EC2_HOST }}
        with:
          script: |
            const port = 8000 + parseInt(process.env.PR_NUMBER);
            const url = `http://${process.env.PREVIEW_EC2_HOST}:${port}`;
            const body = `### Preview Environment\n\n**${url}**\n\n_Redeployed on each push. Torn down when this PR is closed._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(process.env.PR_NUMBER),
            });

            const existing = comments.find(c => c.body.includes('Preview Environment'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(process.env.PR_NUMBER),
                body,
              });
            }
